<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1280" height="720" fill="#ffffff"/>
  <!-- Title -->
  <text x="640" y="52" text-anchor="middle" font-size="36" font-weight="800" fill="#1f2937" letter-spacing="-0.5">Why AI delivery is different</text>
  <text x="640" y="84" text-anchor="middle" font-size="16" fill="#64748b">Five things every project manager assumes that AI breaks</text>
  <!-- Column headers -->
  <text x="260"  y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="0.6">A NORMAL PROJECT ASSUMES…</text>
  <text x="650"  y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="0.6">AI BREAKS IT…</text>
  <text x="1045" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="0.6">SO YOU MUST…</text>

  <!-- Rows: centers 209,318,427,536,645 ; chip h=84 -->
  <g font-size="16">
    <!-- arrows + badges + chips generated per row -->
    <!-- ROW 1 (c=209) -->
    <circle cx="44" cy="209" r="15" fill="#f59e0b"/><text x="44" y="214" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">1</text>
    <rect x="70" y="167" width="380" height="84" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/><text x="260" y="214" text-anchor="middle" fill="#334155">&#8220;Done&#8221; is specifiable</text>
    <text x="475" y="216" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="500" y="167" width="300" height="84" rx="12" fill="#dbeafe" stroke="#bfdbfe"/><text x="650" y="214" text-anchor="middle" fill="#1e40af" font-weight="600">Non-deterministic; no spec</text>
    <text x="824" y="216" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="850" y="167" width="390" height="84" rx="12" fill="#d1fae5" stroke="#a7f3d0"/>
    <text x="1045" y="201" text-anchor="middle" fill="#065f46" font-weight="600" font-size="15">Manage a distribution;</text>
    <text x="1045" y="223" text-anchor="middle" fill="#065f46" font-weight="600" font-size="15">define &#8220;good enough&#8221;</text>

    <!-- ROW 2 (c=318) -->
    <circle cx="44" cy="318" r="15" fill="#f59e0b"/><text x="44" y="323" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">2</text>
    <rect x="70" y="276" width="380" height="84" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/><text x="260" y="323" text-anchor="middle" fill="#334155">A working demo &#8776; done</text>
    <text x="475" y="325" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="500" y="276" width="300" height="84" rx="12" fill="#dbeafe" stroke="#bfdbfe"/><text x="650" y="323" text-anchor="middle" fill="#1e40af" font-weight="600">Demo-to-production gap</text>
    <text x="824" y="325" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="850" y="276" width="390" height="84" rx="12" fill="#d1fae5" stroke="#a7f3d0"/><text x="1045" y="323" text-anchor="middle" fill="#065f46" font-weight="600">Treat progress as illusory</text>

    <!-- ROW 3 (c=427) -->
    <circle cx="44" cy="427" r="15" fill="#f59e0b"/><text x="44" y="432" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">3</text>
    <rect x="70" y="385" width="380" height="84" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/><text x="260" y="432" text-anchor="middle" fill="#334155">Requirements are the uncertainty</text>
    <text x="475" y="434" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="500" y="385" width="300" height="84" rx="12" fill="#dbeafe" stroke="#bfdbfe"/>
    <text x="650" y="419" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="15">The data is discovered,</text>
    <text x="650" y="441" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="15">not specified</text>
    <text x="824" y="434" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="850" y="385" width="390" height="84" rx="12" fill="#d1fae5" stroke="#a7f3d0"/><text x="1045" y="432" text-anchor="middle" fill="#065f46" font-weight="600">Run delivery as discovery</text>

    <!-- ROW 4 (c=536) -->
    <circle cx="44" cy="536" r="15" fill="#f59e0b"/><text x="44" y="541" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">4</text>
    <rect x="70" y="494" width="380" height="84" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/><text x="260" y="541" text-anchor="middle" fill="#334155">QA is a phase</text>
    <text x="475" y="543" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="500" y="494" width="300" height="84" rx="12" fill="#dbeafe" stroke="#bfdbfe"/><text x="650" y="541" text-anchor="middle" fill="#1e40af" font-weight="600">Verification is the product</text>
    <text x="824" y="543" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="850" y="494" width="390" height="84" rx="12" fill="#d1fae5" stroke="#a7f3d0"/><text x="1045" y="541" text-anchor="middle" fill="#065f46" font-weight="600">Design where judgement lives</text>

    <!-- ROW 5 (c=645) -->
    <circle cx="44" cy="645" r="15" fill="#f59e0b"/><text x="44" y="650" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">5</text>
    <rect x="70" y="603" width="380" height="84" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/><text x="260" y="650" text-anchor="middle" fill="#334155">More throughput = more value</text>
    <text x="475" y="652" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="500" y="603" width="300" height="84" rx="12" fill="#dbeafe" stroke="#bfdbfe"/><text x="650" y="650" text-anchor="middle" fill="#1e40af" font-weight="600">Generic is the baseline</text>
    <text x="824" y="652" font-size="22" fill="#94a3b8">&#8594;</text>
    <rect x="850" y="603" width="390" height="84" rx="12" fill="#d1fae5" stroke="#a7f3d0"/><text x="1045" y="650" text-anchor="middle" fill="#065f46" font-weight="600">Protect the human variation</text>
  </g>
</svg>
