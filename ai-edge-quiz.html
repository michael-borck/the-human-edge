<!-- "Where's your edge?" – AI self-check popup overlay.
     Self-contained: launcher button + modal + quiz. Scoped under #aiq-* so it
     won't clash with the Quarto theme. Branded to the editorial look
     (cream / ink / vermilion; Fraunces + Inter + JetBrains Mono). Injected
     site-wide via _quarto.yml include-after-body. -->
<style>
#aiq-launch{position:fixed; left:18px; bottom:18px; z-index:1000; display:flex; align-items:center; gap:8px;
  background:#181613; color:#f4efe3; border:none; padding:11px 16px; border-radius:999px; cursor:pointer;
  font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:.01em;
  box-shadow:4px 4px 0 #e34f29; transition:transform .12s ease, box-shadow .12s ease;}
#aiq-launch:hover{transform:translate(-2px,-2px); box-shadow:6px 6px 0 #e34f29;}
#aiq-launch .aiq-dot{width:8px;height:8px;border-radius:50%;background:#e34f29;}
#aiq-overlay{position:fixed; inset:0; z-index:1001; display:none; align-items:center; justify-content:center;
  background:rgba(24,22,19,.55); padding:20px;}
#aiq-overlay.open{display:flex;}
#aiq-card{position:relative; width:min(560px,100%); max-height:92vh; overflow:auto;
  background:#f4efe3; color:#181613; border:3px solid #181613; box-shadow:10px 10px 0 #181613;
  font-family:'Inter',sans-serif;}
#aiq-card *{box-sizing:border-box;}
#aiq-close{position:absolute; top:10px; right:12px; background:none; border:none; font-size:26px; line-height:1;
  color:#4a443c; cursor:pointer; padding:4px 8px;}
#aiq-close:hover{color:#e34f29;}
#aiq-inner{padding:34px 30px 26px;}
.aiq-kick{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.22em; text-transform:uppercase;
  color:#e34f29; font-weight:600; margin-bottom:8px;}
#aiq-card h2{font-family:'Fraunces',serif; font-weight:900; font-size:27px; line-height:1.05; letter-spacing:-.01em; margin:0 0 10px;}
.aiq-lead{font-size:14.5px; line-height:1.55; color:#4a443c; margin:0 0 18px;}
/* progress */
#aiq-progwrap{display:none; margin-bottom:18px;}
#aiq-progbar{height:6px; background:#ece5d4; border:1px solid #181613;}
#aiq-progfill{height:100%; width:0; background:#e34f29; transition:width .25s ease;}
.aiq-proglabel{display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10.5px;
  letter-spacing:.14em; text-transform:uppercase; color:#4a443c; margin-bottom:6px;}
/* options */
.aiq-q{font-family:'Fraunces',serif; font-weight:600; font-size:18px; line-height:1.3; margin:0 0 14px;}
.aiq-opts{display:flex; flex-direction:column; gap:9px;}
.aiq-opt{display:block; background:#fff; border:2px solid #181613; padding:12px 14px; cursor:pointer;
  font-size:14px; line-height:1.35; transition:transform .1s ease, box-shadow .1s ease, background .1s;}
.aiq-opt:hover{transform:translate(-2px,-2px); box-shadow:4px 4px 0 #181613;}
.aiq-opt.sel{background:#181613; color:#f4efe3; box-shadow:4px 4px 0 #e34f29;}
/* nav */
#aiq-nav{display:none; margin-top:20px; gap:10px;}
.aiq-btn{font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; padding:10px 18px;
  border:2px solid #181613; background:#fff; color:#181613;}
.aiq-btn:hover{background:#ece5d4;}
.aiq-btn:disabled{opacity:.4; cursor:not-allowed;}
#aiq-next{margin-left:auto; background:#e34f29; color:#fff; border-color:#181613;}
#aiq-next:hover{background:#c4451f;}
/* result */
#aiq-result{display:none;}
.aiq-badge{display:inline-block; background:#e34f29; color:#fff; font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:600; padding:4px 10px; margin-bottom:12px;}
.aiq-result-title{font-family:'Fraunces',serif; font-weight:900; font-size:30px; line-height:1; margin:0 0 12px;}
.aiq-result-body{font-size:14.5px; line-height:1.55; color:#4a443c; margin:0 0 16px;}
.aiq-stretch{background:#fff; border:2px solid #181613; padding:14px 16px; margin:0 0 14px;}
.aiq-stretch .lab{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase;
  color:#e34f29; font-weight:600; margin-bottom:5px;}
.aiq-stretch p{margin:0; font-size:14px; line-height:1.5;}
.aiq-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
#aiq-retry{background:#fff;}
.aiq-link{text-decoration:none; display:inline-flex; align-items:center;}
</style>

<button id="aiq-launch" aria-label="Open the AI self-check"><span class="aiq-dot"></span>Where's your edge?</button>

<div id="aiq-overlay" role="dialog" aria-modal="true" aria-label="AI self-check">
  <div id="aiq-card">
    <button id="aiq-close" aria-label="Close">&times;</button>
    <div id="aiq-inner">
      <!-- intro -->
      <div id="aiq-intro">
        <div class="aiq-kick">2-minute self-check</div>
        <h2>Where's your edge?</h2>
        <p class="aiq-lead">Six quick questions to place you on your AI journey and show where today will stretch you most. No score is "better" – it just points you to the part of the day built for where you are.</p>
        <button class="aiq-btn" id="aiq-start" style="background:#e34f29;color:#fff;">Start &rarr;</button>
      </div>
      <!-- quiz -->
      <div id="aiq-quiz" style="display:none;">
        <div id="aiq-progwrap">
          <div class="aiq-proglabel"><span id="aiq-progq">Question 1 of 6</span><span id="aiq-progpct">0%</span></div>
          <div id="aiq-progbar"><div id="aiq-progfill"></div></div>
        </div>
        <div class="aiq-q" id="aiq-qtext"></div>
        <div class="aiq-opts" id="aiq-opts"></div>
      </div>
      <div id="aiq-nav">
        <button class="aiq-btn" id="aiq-prev">&larr; Back</button>
        <button class="aiq-btn" id="aiq-next">Next &rarr;</button>
      </div>
      <!-- result -->
      <div id="aiq-result"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const QUESTIONS = [
    { q: "How often do you use AI tools like ChatGPT, Claude or Copilot?",
      opts: [
        ["Never, or hardly ever", {explorer:3}],
        ["Once in a while", {explorer:1, user:1}],
        ["Most weeks", {user:2, operator:1}],
        ["Daily – it's part of how I work", {operator:2, builder:1}] ] },
    { q: "When AI gives you an answer, you usually…",
      opts: [
        ["Use it pretty much as-is", {user:3}],
        ["Give it a quick skim to see if it looks right", {user:2}],
        ["Check the key facts before I rely on it", {operator:2}],
        ["Treat it as a first draft and verify anything that matters", {operator:1, builder:1}] ] },
    { q: "How do you usually prompt?",
      opts: [
        ["I type a question and hope for the best", {explorer:2, user:1}],
        ["I ask again, rephrasing, until it's better", {user:2}],
        ["I give it a role, context and format (something like RTCF)", {operator:2}],
        ["I've built reusable prompts or run local models", {operator:1, builder:2}] ] },
    { q: "How confident would you be explaining AI to a colleague?",
      opts: [
        ["Not confident – I'm still finding my feet", {explorer:3}],
        ["I could share the basics", {user:2}],
        ["Fairly confident on practical uses", {operator:2}],
        ["Very – I help others with it regularly", {operator:1, builder:2}] ] },
    { q: "Have you scoped or led an AI project or initiative?",
      opts: [
        ["No, not yet", {explorer:1, user:1}],
        ["I've thought about it", {user:1, operator:1}],
        ["One is in progress", {operator:1, builder:2}],
        ["Yes, a few", {builder:3}] ] },
    { q: "Where do you feel least confident right now?",
      opts: [
        ["Actually using AI day-to-day", {explorer:2, user:1}],
        ["Knowing when to trust it (and when not to)", {user:2}],
        ["Getting genuinely good output, not generic", {operator:2}],
        ["Turning it into a real project that ships", {builder:3}] ] }
  ];

  const PROFILES = {
    explorer: {
      title: "The Explorer", badge: "Early on your journey",
      body: "You're at the start – and that's the best place to build the habit that lasts: judging AI before you trust it. Don't worry about the project layer yet.",
      stretch: "The morning is your sweet spot: hands-on fluency, the trust tool, and the two-pass demo. Get the judgement first; everything else builds on it.",
      goto: "Readings", href: "before.html" },
    user: {
      title: "The Hands-on User", badge: "Using it – trust is doing the work",
      body: "You're using AI, but the way you trust it is carrying the load. Your biggest win today is making that trust deliberate instead of instinctive.",
      stretch: "The trust tool and the verification habit. Learn exactly when to lean in and where a human must stay in the loop – it'll change how you use AI every day.",
      goto: "The workshop", href: "workshop.html" },
    operator: {
      title: "The Confident Operator", badge: "Fluent – time to make it stick",
      body: "You're fluent. Your edge now is two things: making your judgement permanent, and lifting it from your desk to a project that ships.",
      stretch: "The two-page voice method (make your edge stick) and the afternoon's delivery layer – leading projects that don't fail the predictable ways.",
      goto: "Frameworks", href: "frameworks.html" },
    builder: {
      title: "The Builder", badge: "Thinking at the project level",
      body: "You're already operating at the initiative level. Today is about sharpening how you design the human into delivery and make the go/no-go call.",
      stretch: "The afternoon: the five differences, human-in-the-loop design, and Scale / Pivot / Kill. Bring a real initiative to scope.",
      goto: "The workshop", href: "workshop.html" }
  };

  const launch=document.getElementById('aiq-launch');
  const overlay=document.getElementById('aiq-overlay');
  const card=document.getElementById('aiq-card');
  const closeBtn=document.getElementById('aiq-close');
  let cur=0, answers={};

  function open(){ overlay.classList.add('open'); reset(); }
  function close(){ overlay.classList.remove('open'); }
  launch.addEventListener('click', open);
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape' && overlay.classList.contains('open')) close(); });

  const intro=document.getElementById('aiq-intro'), quiz=document.getElementById('aiq-quiz'),
        nav=document.getElementById('aiq-nav'), result=document.getElementById('aiq-result'),
        progwrap=document.getElementById('aiq-progwrap');

  function reset(){
    cur=0; answers={};
    intro.style.display='block'; quiz.style.display='none'; nav.style.display='none'; result.style.display='none';
  }
  document.getElementById('aiq-start').addEventListener('click', ()=>{
    intro.style.display='none'; quiz.style.display='block'; nav.style.display='flex';
    render();
  });

  function render(){
    const pct=Math.round((cur/QUESTIONS.length)*100);
    document.getElementById('aiq-progq').textContent='Question '+(cur+1)+' of '+QUESTIONS.length;
    document.getElementById('aiq-progpct').textContent=pct+'%';
    document.getElementById('aiq-progfill').style.width=pct+'%';
    progwrap.style.display='block';
    document.getElementById('aiq-qtext').textContent=QUESTIONS[cur].q;
    const opts=document.getElementById('aiq-opts'); opts.innerHTML='';
    QUESTIONS[cur].opts.forEach((o,i)=>{
      const sel = answers[cur]===i ? ' sel':'';
      const div=document.createElement('div');
      div.className='aiq-opt'+sel;
      div.textContent=o[0];
      div.addEventListener('click', ()=>{ answers[cur]=i; [...opts.children].forEach(c=>c.classList.remove('sel')); div.classList.add('sel'); updateNav(); });
      opts.appendChild(div);
    });
    updateNav();
  }
  function updateNav(){
    document.getElementById('aiq-prev').disabled = cur===0;
    const next=document.getElementById('aiq-next');
    next.disabled = answers[cur]===undefined;
    next.textContent = cur===QUESTIONS.length-1 ? 'See your edge →' : 'Next →';
  }
  document.getElementById('aiq-prev').addEventListener('click', ()=>{ if(cur>0){cur--; render();} });
  document.getElementById('aiq-next').addEventListener('click', ()=>{
    if(answers[cur]===undefined) return;
    if(cur<QUESTIONS.length-1){ cur++; render(); } else { showResult(); }
  });

  function showResult(){
    const score={explorer:0,user:0,operator:0,builder:0};
    QUESTIONS.forEach((Q,i)=>{ const choice=Q.opts[answers[i]][1]; for(const k in choice) score[k]+=choice[k]; });
    // highest, tie-break: builder > operator > user > explorer
    let best='explorer', order=['builder','operator','user','explorer'];
    order.forEach(k=>{ if(score[k]>(score[best]||0)) best=k; });
    const p=PROFILES[best];
    quiz.style.display='none'; nav.style.display='none'; progwrap.style.display='none';
    result.style.display='block';
    result.innerHTML =
      '<div class="aiq-badge">'+p.badge+'</div>'+
      '<div class="aiq-result-title">'+p.title+'</div>'+
      '<p class="aiq-result-body">'+p.body+'</p>'+
      '<div class="aiq-stretch"><div class="lab">Where today will stretch you</div><p>'+p.stretch+'</p></div>'+
      '<div class="aiq-actions">'+
        '<a class="aiq-btn aiq-link" href="'+p.href+'">Go to '+p.goto+' →</a>'+
        '<button class="aiq-btn" id="aiq-retry">Retake</button>'+
      '</div>';
    document.getElementById('aiq-retry').addEventListener('click', reset);
  }
})();
</script>
